<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>GOLD PX - Premium Lighting Technology</title><link rel="icon" type="image/x-icon" href="/favicon.ico"><link rel="stylesheet" href="../src/styles/main.css"><style>body{background:var(--bg-primary);color:var(--text-primary)}.loader{position:fixed;inset:0;background:var(--bg-primary);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.8s ease}.loader .logo{font-size:3rem;font-weight:800;color:var(--color-gold);font-family:var(--font-secondary)}.loader .logo span{color:var(--color-cyan)}.loader .bar{width:200px;height:3px;background:var(--bg-tertiary);border-radius:10px;margin:1rem 0;overflow:hidden}.loader .bar-inner{height:100%;width:0%;background:linear-gradient(90deg,var(--color-gold),var(--color-cyan))}.loader p{color:var(--text-tertiary);font-size:0.9rem}</style></head><body><div class="loader" id="loader"><div class="logo">GOLD<span>PX</span></div><div class="bar"><div class="bar-inner" id="progress"></div></div><p id="status">Loading...</p></div><main id="main" style="display:none;"></main><script>(function(){const l=document.getElementById("loader"),m=document.getElementById("main"),b=document.getElementById("progress"),s=document.getElementById("status");const files=["../src/components/Navigation/Navigation.html","../src/sections/Hero/Hero.html","../src/sections/Services/Services.html","../src/sections/Portfolio/Portfolio.html","../src/components/Footer/Footer.html"];let i=0;function next(){if(i>=files.length){s.textContent="Ready!";b.style.width="100%";setTimeout(()=>{l.classList.add("hidden");setTimeout(()=>{l.style.display="none";m.style.display="block";},300)},500);return}s.textContent="Loading "+files[i].split("/").pop()+"...";fetch(files[i]).then(r=>r.text()).then(h=>{m.innerHTML+=h;b.style.width=(((i+1)/files.length)*100)+"%";i++;next();}).catch(()=>{i++;next();})}next();})();</script></body></html>
