<!-- frontend/src/components/LoadingScreen/index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading - Gold PX</title>
  <link rel="stylesheet" href="../../styles/main.css">
  <link rel="stylesheet" href="../../animations/animations.css">
  <style>
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s var(--ease-in-out), visibility 0.8s var(--ease-in-out);
    }
    
    .loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    
    .loading-logo {
      font-size: var(--text-4xl);
      font-weight: 800;
      font-family: var(--font-secondary);
      color: var(--color-primary);
      margin-bottom: var(--spacing-4);
      letter-spacing: -0.02em;
    }
    
    .loading-logo span {
      color: var(--color-secondary);
    }
    
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--bg-tertiary);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    .loading-progress {
      margin-top: var(--spacing-4);
      width: 200px;
      height: 3px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    
    .loading-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
      transition: width 0.3s var(--ease-out);
    }
    
    .loading-text {
      margin-top: var(--spacing-2);
      color: var(--text-tertiary);
      font-size: var(--text-sm);
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loadingScreen" role="status" aria-label="Loading">
    <div class="loading-logo">Gold<span>PX</span></div>
    <div class="loading-spinner"></div>
    <div class="loading-progress">
      <div class="loading-progress-bar" id="progressBar"></div>
    </div>
    <p class="loading-text" id="loadingText">Loading assets...</p>
  </div>

  <script>
    (function() {
      'use strict';
      
      const loadingScreen = document.getElementById('loadingScreen');
      const progressBar = document.getElementById('progressBar');
      const loadingText = document.getElementById('loadingText');
      
      let progress = 0;
      const loadingSteps = [
        { progress: 20, text: 'Loading styles...' },
        { progress: 40, text: 'Loading components...' },
        { progress: 60, text: 'Loading animations...' },
        { progress: 80, text: 'Loading data...' },
        { progress: 100, text: 'Ready!' }
      ];
      
      function updateLoading() {
        const step = loadingSteps.find(s => progress < s.progress);
        if (step) {
          loadingText.textContent = step.text;
          progressBar.style.width = progress + '%';
        }
        
        if (progress < 100) {
          progress += Math.random() * 5 + 2;
          if (progress > 100) progress = 100;
          setTimeout(updateLoading, 150 + Math.random() * 200);
        } else {
          setTimeout(() => {
            loadingScreen.classList.add('hidden');
            document.body.style.overflow = 'auto';
            // Trigger main app initialization
            if (typeof window.initApp === 'function') {
              window.initApp();
            }
          }, 500);
        }
      }
      
      // Start loading
      document.body.style.overflow = 'hidden';
      updateLoading();
    })();
  </script>
</body>
</html>
